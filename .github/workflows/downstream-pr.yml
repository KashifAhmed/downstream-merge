name: Downstream PR

# Chain: master → uat → staging
# Fires on every push (i.e. after a PR is merged) to any of these branches.

on:
  push:
    branches:
      - master
      - uat

# Prevent duplicate PRs from rapid merges
concurrency:
  group: downstream-pr-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  downstream-pr:
    name: "${{ github.ref_name }} → downstream"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. GitHub → Slack user mapping ───────────────────────────────────
      - name: Setup Slack user mapping
        id: slack_users
        run: |
          # Map GitHub usernames to Slack user IDs
          # Edit this section to add/update mappings
          declare -A SLACK_MAP=(
            ["KashifAhmed"]="kashif"      # Replace with actual Slack user ID
            ["john-doe"]="U87654321"         # Replace with actual Slack user ID
            ["jane-smith"]="U11223344"       # Replace with actual Slack user ID
            # Add more mappings: ["github-username"]="Slack-User-ID"
          )
          
          # Export mapping as JSON for easy lookup
          {
            echo "slack_map_json<<EOF"
            for github_user in "${!SLACK_MAP[@]}"; do
              echo "$github_user=${SLACK_MAP[$github_user]}"
            done | jq -R -s 'split("\n") | map(select(length > 0)) | map(split("=") | {(.[0]): .[1]}) | add'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          # Save mapping to file for sourcing in later steps
          mkdir -p /tmp/slack_map
          for github_user in "${!SLACK_MAP[@]}"; do
            echo "${SLACK_MAP[$github_user]}" > "/tmp/slack_map/$github_user"
          done

      # ── 2. Resolve target branch ──────────────────────────────────────────
      - name: Resolve target branch
        id: branches
        run: |
          SOURCE="${{ github.ref_name }}"
          case "$SOURCE" in
            master) TARGET="uat"     ;;
            uat)    TARGET="staging" ;;
            *)
              echo "No downstream target for branch: $SOURCE — skipping."
              echo "has_target=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "source=$SOURCE"   >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"
          echo "has_target=true"  >> "$GITHUB_OUTPUT"

      # ── 2. Check whether target is already up to date ────────────────────
      - name: Check for diff
        id: diff
        if: steps.branches.outputs.has_target == 'true'
        run: |
          git fetch origin ${{ steps.branches.outputs.target }}

          # Use merge-base to detect force-push safely
          if git merge-base --is-ancestor origin/${{ steps.branches.outputs.target }} HEAD; then
            AHEAD=$(git rev-list --count origin/${{ steps.branches.outputs.target }}..HEAD)
            echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
            echo "Commits ahead of ${{ steps.branches.outputs.target }}: $AHEAD"
          else
            echo "Target branch is not an ancestor of current branch (possible force-push detected)"
            # Treat as if all commits are different
            AHEAD=$(git rev-list --count HEAD)
            echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
            echo "Commits to sync: $AHEAD"
          fi

      # ── 3. Check for merge conflicts ─────────────────────────────────────
      - name: Check for merge conflicts
        id: conflicts
        if: steps.branches.outputs.has_target == 'true' && steps.diff.outputs.ahead != '0'
        run: |
          git fetch origin ${{ steps.branches.outputs.target }}

          # Try a dry-run merge
          if ! git merge --no-commit --no-ff origin/${{ steps.branches.outputs.target }} 2>/dev/null; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || true
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            # Only abort if MERGE_HEAD exists (i.e., a merge was actually started)
            if [ -e .git/MERGE_HEAD ]; then
              git merge --abort
            fi
          fi

      # ── 4. Check for an already-open PR (idempotency) ────────────────────
      - name: Check for existing open PR
        id: existing
        if: steps.branches.outputs.has_target == 'true' && steps.diff.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry up to 3 times with exponential backoff
          for attempt in 1 2 3; do
            PR_JSON=$(gh pr list \
              --head "${{ steps.branches.outputs.source }}" \
              --base "${{ steps.branches.outputs.target }}" \
              --state open \
              --json number,url \
              --jq '.[0] // empty' 2>/dev/null) && break

            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            fi
          done

          if [ -n "$PR_JSON" ]; then
            echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "pr_url=$(echo "$PR_JSON" | jq -r '.url')"       >> "$GITHUB_OUTPUT"
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Create the downstream PR ──────────────────────────────────────
      - name: Create downstream PR
        id: create_pr
        if: >
          steps.branches.outputs.has_target == 'true' &&
          steps.diff.outputs.ahead != '0' &&
          steps.conflicts.outputs.has_conflicts != 'true' &&
          steps.existing.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE="${{ steps.branches.outputs.source }}"
          TARGET="${{ steps.branches.outputs.target }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PR_BODY=$(printf '%s\n' \
            '## Downstream Sync' \
            '' \
            "Automated PR triggered by a merge into \`$SOURCE\`." \
            '' \
            "- **From:** \`$SOURCE\`" \
            "- **Into:** \`$TARGET\`" \
            "- **Triggered by:** @${{ github.actor }}" \
            "- **Commit:** [\`$SHORT_SHA\`]($COMMIT_URL)" \
            "- **Commit message:** $COMMIT_MSG" \
            "- **Workflow run:** [View run]($RUN_URL)" \
            '' \
            "> Merge this PR to continue the downstream chain: \`$TARGET\` → next environment." \
            '' \
            '---' \
            '*Created automatically by the downstream-pr workflow.*')

          # Retry up to 3 times with exponential backoff
          for attempt in 1 2 3; do
            PR_URL=$(gh pr create \
              --head  "$SOURCE" \
              --base  "$TARGET" \
              --title "chore: sync $SOURCE -> $TARGET ($SHORT_SHA)" \
              --body  "$PR_BODY") && break

            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Failed to create PR after 3 attempts" >&2
              exit 1
            fi
          done

          echo "pr_url=$PR_URL"       >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "commit_msg<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 6a. Slack — Conflict detected (PR not created) ───────────────────
      - name: Slack — conflict detected
        if: steps.conflicts.outputs.has_conflicts == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE:       ${{ steps.branches.outputs.source }}
          TARGET:       ${{ steps.branches.outputs.target }}
          SHORT_SHA:    $(git rev-parse --short HEAD)
          COMMIT_MSG:   $(git log -1 --pretty=format:"%s")
          ACTOR:        ${{ github.actor }}
        run: |
          # Lookup Slack user ID
          SLACK_USER_FILE="/tmp/slack_map/$ACTOR"
          if [ -f "$SLACK_USER_FILE" ]; then
            SLACK_USER_ID=$(cat "$SLACK_USER_FILE")
            ACTOR_TAG="<@$SLACK_USER_ID>"
          else
            ACTOR_TAG="@$ACTOR"
          fi
          
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg source     "$SOURCE" \
            --arg target     "$TARGET" \
            --arg sha        "$SHORT_SHA" \
            --arg msg        "$COMMIT_MSG" \
            --arg actor      "$ACTOR_TAG" \
            --arg run_url    "$RUN_URL" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🚫  " + $source + " → " + $target + " - Merge Conflict"), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("⚠️ *Cannot create downstream PR*\n\nMerge conflict detected between `" + $source + "` and `" + $target + "`.\n\n👤 Triggered by: " + $actor + "\n📝 Commit: `" + $sha + "` - " + $msg)
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type:  "button",
                      text:  { type: "plain_text", text: "View Workflow Run", emoji: true },
                      url:   $run_url,
                      style: "danger"
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

      # ── 6b. Slack — PR successfully created ──────────────────────────────
      - name: Slack — PR created
        if: steps.create_pr.outputs.pr_url != '' && steps.conflicts.outputs.has_conflicts != 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE:       ${{ steps.branches.outputs.source }}
          TARGET:       ${{ steps.branches.outputs.target }}
          PR_URL:       ${{ steps.create_pr.outputs.pr_url }}
          SHORT_SHA:    ${{ steps.create_pr.outputs.short_sha }}
          COMMIT_MSG:   ${{ steps.create_pr.outputs.commit_msg }}
          ACTOR:        ${{ github.actor }}
        run: |
          # Lookup Slack user ID
          SLACK_USER_FILE="/tmp/slack_map/$ACTOR"
          if [ -f "$SLACK_USER_FILE" ]; then
            SLACK_USER_ID=$(cat "$SLACK_USER_FILE")
            ACTOR_TAG="<@$SLACK_USER_ID>"
          else
            ACTOR_TAG="@$ACTOR"
          fi
          
          jq -n \
            --arg source     "$SOURCE" \
            --arg target     "$TARGET" \
            --arg pr_url     "$PR_URL" \
            --arg sha        "$SHORT_SHA" \
            --arg msg        "$COMMIT_MSG" \
            --arg actor      "$ACTOR_TAG" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🔀  " + $source + " → " + $target), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*" + $actor + "* · `" + $sha + "`\n" + $msg)
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type:  "button",
                      text:  { type: "plain_text", text: "Review PR", emoji: true },
                      url:   $pr_url,
                      style: "primary"
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

      # ── 6c. Slack — PR already exists (reminder) ─────────────────────────
      - name: Slack — PR already exists
        if: steps.existing.outputs.pr_exists == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE:     ${{ steps.branches.outputs.source }}
          TARGET:     ${{ steps.branches.outputs.target }}
          PR_URL:     ${{ steps.existing.outputs.pr_url }}
          ACTOR:      ${{ github.actor }}
        run: |
          # Lookup Slack user ID
          SLACK_USER_FILE="/tmp/slack_map/$ACTOR"
          if [ -f "$SLACK_USER_FILE" ]; then
            SLACK_USER_ID=$(cat "$SLACK_USER_FILE")
            ACTOR_TAG="<@$SLACK_USER_ID>"
          else
            ACTOR_TAG="@$ACTOR"
          fi
          
          jq -n \
            --arg source    "$SOURCE" \
            --arg target    "$TARGET" \
            --arg pr_url    "$PR_URL" \
            --arg actor     "$ACTOR_TAG" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🔀  " + $source + " → " + $target), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("ℹ️ *PR already open* — " + $actor + "\nPlease review and merge to keep the chain moving.")
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Open PR", emoji: true },
                      url:  $pr_url
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

      # ── 6d. Slack — Workflow failed ───────────────────────────────────────
      - name: Slack — workflow failed
        if: failure() && steps.branches.outputs.has_target == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE: ${{ steps.branches.outputs.source }}
          TARGET: ${{ steps.branches.outputs.target }}
          ACTOR: ${{ github.actor }}
        run: |
          # Lookup Slack user ID
          SLACK_USER_FILE="/tmp/slack_map/$ACTOR"
          if [ -f "$SLACK_USER_FILE" ]; then
            SLACK_USER_ID=$(cat "$SLACK_USER_FILE")
            ACTOR_TAG="<@$SLACK_USER_ID>"
          else
            ACTOR_TAG="@$ACTOR"
          fi
          
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg source "$SOURCE" \
            --arg target "$TARGET" \
            --arg actor "$ACTOR_TAG" \
            --arg run_url "$RUN_URL" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🔀  " + $source + " → " + $target), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("❌ *Sync failed* — " + $actor + "\nPlease check the workflow logs.")
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type:  "button",
                      text:  { type: "plain_text", text: "View Workflow Run", emoji: true },
                      url:   $run_url,
                      style: "danger"
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

