name: Downstream PR

# Chain: master → uat → staging
# Fires on every push (i.e. after a PR is merged) to any of these branches.

on:
  push:
    branches:
      - master
      - uat

# Prevent duplicate PRs from rapid merges
concurrency:
  group: downstream-pr-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  downstream-pr:
    name: "${{ github.ref_name }} → downstream"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 0. Validate environment & secrets ─────────────────────────────────
      - name: Validate environment
        run: |
          set -e
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "::warning::SLACK_WEBHOOK_URL not set — Slack notifications will be skipped"
          fi
          if [[ ! -f "$GITHUB_WORKSPACE/.github/slack-users.json" ]]; then
            echo "::warning::slack-users.json not found — Slack user mentions will be disabled"
          fi

      # ── 1. GitHub → Slack user mapping ───────────────────────────────────
      - name: Setup Slack user mapping
        id: slack_users
        run: |
          # Load Slack user mapping from central JSON file
          # See: .github/slack-users.json
          #
          # How to find your Slack User ID:
          #   1. Open Slack
          #   2. Click on your profile picture (or the person's)
          #   3. Click ⋯ (three dots) → "Copy member ID"
          #   4. Add to .github/slack-users.json
          #
          SLACK_MAP=$(jq -c '.' "$GITHUB_WORKSPACE/.github/slack-users.json")
          echo "slack_map_json=$SLACK_MAP" >> "$GITHUB_OUTPUT"

      # ── 2. Resolve target branch ──────────────────────────────────────────
      - name: Resolve target branch
        id: branches
        run: |
          SOURCE="${{ github.ref_name }}"
          case "$SOURCE" in
            master) TARGET="uat"     ;;
            uat)    TARGET="staging" ;;
            *)
              echo "No downstream target for branch: $SOURCE — skipping."
              echo "has_target=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "source=$SOURCE"   >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"
          echo "has_target=true"  >> "$GITHUB_OUTPUT"

      # ── 2. Check whether target is already up to date ────────────────────
      - name: Check for diff
        id: diff
        if: steps.branches.outputs.has_target == 'true'
        run: |
          git fetch origin ${{ steps.branches.outputs.target }}

          # Use merge-base to detect force-push safely
          if git merge-base --is-ancestor origin/${{ steps.branches.outputs.target }} HEAD; then
            AHEAD=$(git rev-list --count origin/${{ steps.branches.outputs.target }}..HEAD)
            echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
            echo "Commits ahead of ${{ steps.branches.outputs.target }}: $AHEAD"
          else
            echo "Target branch is not an ancestor of current branch (possible force-push detected)"
            # Treat as if all commits are different
            AHEAD=$(git rev-list --count HEAD)
            echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
            echo "Commits to sync: $AHEAD"
          fi

      # ── 3. Check for an already-open PR (idempotency) ────────────────────
      - name: Check for existing open PR
        id: existing
        if: steps.branches.outputs.has_target == 'true' && steps.diff.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry up to 3 times with exponential backoff
          for attempt in 1 2 3; do
            PR_JSON=$(gh pr list \
              --head "${{ steps.branches.outputs.source }}" \
              --base "${{ steps.branches.outputs.target }}" \
              --state open \
              --json number,url \
              --jq '.[0] // empty' 2>/dev/null) && break

            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            fi
          done

          if [ -n "$PR_JSON" ]; then
            echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "pr_url=$(echo "$PR_JSON" | jq -r '.url')"       >> "$GITHUB_OUTPUT"
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Create the downstream PR ──────────────────────────────────────
      - name: Create downstream PR
        id: create_pr
        if: >
          steps.branches.outputs.has_target == 'true' &&
          steps.diff.outputs.ahead != '0' &&
          steps.existing.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE="${{ steps.branches.outputs.source }}"
          TARGET="${{ steps.branches.outputs.target }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PR_BODY=$(printf '%s\n' \
            '## Downstream Sync' \
            '' \
            "Automated PR triggered by a merge into \`$SOURCE\`." \
            '' \
            "- **From:** \`$SOURCE\`" \
            "- **Into:** \`$TARGET\`" \
            "- **Triggered by:** @${{ github.actor }}" \
            "- **Original author:** $COMMIT_AUTHOR" \
            "- **Commit:** [\`$SHORT_SHA\`]($COMMIT_URL)" \
            "- **Commit message:** $COMMIT_MSG" \
            "- **Workflow run:** [View run]($RUN_URL)" \
            '' \
            "> Merge this PR to continue the downstream chain: \`$TARGET\` → next environment." \
            '' \
            '---' \
            '*Created automatically by the downstream-pr workflow.*')

          # Retry up to 3 times with exponential backoff
          for attempt in 1 2 3; do
            PR_URL=$(gh pr create \
              --head  "$SOURCE" \
              --base  "$TARGET" \
              --title "chore: sync $SOURCE -> $TARGET ($SHORT_SHA)" \
              --body  "$PR_BODY") && break

            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Failed to create PR after 3 attempts" >&2
              exit 1
            fi
          done

          echo "pr_url=$PR_URL"       >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "commit_msg<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "commit_author<<EOF"
            echo "$COMMIT_AUTHOR"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 5a. Check for merge conflicts (after PR created) ─────────────────
      - name: Check for merge conflicts
        id: conflicts
        if: steps.create_pr.outputs.pr_url != ''
        run: |
          git fetch origin ${{ steps.branches.outputs.target }}

          # Try a dry-run merge
          if ! git merge --no-commit --no-ff origin/${{ steps.branches.outputs.target }} 2>/dev/null; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || true
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            # Only abort if MERGE_HEAD exists (i.e., a merge was actually started)
            if [ -e .git/MERGE_HEAD ]; then
              git merge --abort
            fi
          fi

      # ── 5b. Add downstream label ─────────────────────────────────────────
      - name: Add downstream label
        if: steps.create_pr.outputs.pr_url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.create_pr.outputs.pr_url }}" --add-label "automated-downstream"

      # ── 6. Slack notification — PR created (with or without conflicts) ───
      - name: Slack — PR created
        if: steps.create_pr.outputs.pr_url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE:       ${{ steps.branches.outputs.source }}
          TARGET:       ${{ steps.branches.outputs.target }}
          PR_URL:       ${{ steps.create_pr.outputs.pr_url }}
          SHORT_SHA:    ${{ steps.create_pr.outputs.short_sha }}
          COMMIT_MSG:   ${{ steps.create_pr.outputs.commit_msg }}
          COMMIT_AUTHOR: ${{ steps.create_pr.outputs.commit_author }}
          ACTOR:        ${{ github.actor }}
          SLACK_USER_ID: ${{ steps.slack_users.outputs.slack_map_json }}
          HAS_CONFLICTS: ${{ steps.conflicts.outputs.has_conflicts }}
        run: |
          # Lookup Slack User ID from mapping (case-insensitive)
          USER_ID=$(echo "$SLACK_USER_ID" | jq -r --arg actor "$ACTOR" 'to_entries | map(select((.key | ascii_downcase) == ($actor | ascii_downcase))) | .[0].value // ""')

          # Determine message based on conflict status
          if [ "$HAS_CONFLICTS" = "true" ]; then
            HEADER="🚫  $SOURCE → $TARGET - Merge Conflict"
            TEXT="⚠️ *Merge conflict detected*\n\nPR created but requires manual resolution.\n\n👤 Triggered by: $(if [ -n "$USER_ID" ]; then echo "<@$USER_ID>"; else echo "@$ACTOR"; fi)\n📝 Commit: \`$SHORT_SHA\` by $COMMIT_AUTHOR\n💬 $COMMIT_MSG"
            BUTTON_STYLE="danger"
            BUTTON_TEXT="View Conflicting PR"
          else
            HEADER="🔀  $SOURCE → $TARGET"
            TEXT="*$USER_ID* · \`$SHORT_SHA\`\n$COMMIT_MSG\n_Author: $COMMIT_AUTHOR_"
            # Fallback if USER_ID is empty
            if [ -z "$USER_ID" ]; then
              TEXT="@$ACTOR · \`$SHORT_SHA\`\n$COMMIT_MSG\n_Author: $COMMIT_AUTHOR_"
            else
              TEXT="<@$USER_ID> · \`$SHORT_SHA\`\n$COMMIT_MSG\n_Author: $COMMIT_AUTHOR_"
            fi
            BUTTON_STYLE="primary"
            BUTTON_TEXT="Review PR"
          fi

          jq -n \
            --arg header    "$HEADER" \
            --arg text      "$TEXT" \
            --arg pr_url    "$PR_URL" \
            --arg btn_text  "$BUTTON_TEXT" \
            --arg btn_style "$BUTTON_STYLE" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: $header, emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $text
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type:  "button",
                      text:  { type: "plain_text", text: $btn_text, emoji: true },
                      url:   $pr_url,
                      style: $btn_style
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

      # ── 7. Slack — PR already exists (reminder) ──────────────────────────
      - name: Slack — PR already exists
        if: steps.existing.outputs.pr_exists == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE:     ${{ steps.branches.outputs.source }}
          TARGET:     ${{ steps.branches.outputs.target }}
          PR_URL:     ${{ steps.existing.outputs.pr_url }}
          ACTOR:      ${{ github.actor }}
          SLACK_USER_ID: ${{ steps.slack_users.outputs.slack_map_json }}
        run: |
          # Lookup Slack User ID from mapping (case-insensitive)
          USER_ID=$(echo "$SLACK_USER_ID" | jq -r --arg actor "$ACTOR" 'to_entries | map(select((.key | ascii_downcase) == ($actor | ascii_downcase))) | .[0].value // ""')
          
          jq -n \
            --arg source    "$SOURCE" \
            --arg target    "$TARGET" \
            --arg pr_url    "$PR_URL" \
            --arg actor     "$ACTOR" \
            --arg user_id   "$USER_ID" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🔀  " + $source + " → " + $target), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("ℹ️ *PR already open* — " + (if $user_id != "" then "<@" + $user_id + ">" else "@" + $actor end) + "\nPlease review and merge to keep the chain moving.")
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Open PR", emoji: true },
                      url:  $pr_url
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

      # ── 8. Slack — Workflow failed ───────────────────────────────────────
      - name: Slack — workflow failed
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE: ${{ steps.branches.outputs.source }}
          TARGET: ${{ steps.branches.outputs.target }}
          ACTOR: ${{ github.actor }}
          SLACK_USER_ID: ${{ steps.slack_users.outputs.slack_map_json }}
        run: |
          # Lookup Slack User ID from mapping (case-insensitive)
          USER_ID=$(echo "$SLACK_USER_ID" | jq -r --arg actor "$ACTOR" 'to_entries | map(select((.key | ascii_downcase) == ($actor | ascii_downcase))) | .[0].value // ""')

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SOURCE_LABEL="${SOURCE:-unknown}"
          TARGET_LABEL="${TARGET:-unknown}"
          jq -n \
            --arg source "$SOURCE_LABEL" \
            --arg target "$TARGET_LABEL" \
            --arg actor "$ACTOR" \
            --arg user_id "$USER_ID" \
            --arg run_url "$RUN_URL" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("❌  " + $source + " → " + $target + " - Workflow Failed"), emoji: false }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("🔴 *Sync failed* — " + (if $user_id != "" then "<@" + $user_id + ">" else "@" + $actor end) + "\nPlease check the workflow logs.")
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type:  "button",
                      text:  { type: "plain_text", text: "View Workflow Run", emoji: true },
                      url:   $run_url,
                      style: "danger"
                    }
                  ]
                }
              ]
            }' \
          | curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

